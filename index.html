<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>フレカ管理</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #f06292;
    --pink-bg:   #fce4ec;
    --pink-dark: #c2185b;
    --text:      #424242;
    --text-sub:  #9e9e9e;
    --border:    #fce4ec;
    --bg:        #fdf6f9;
    --white:     #ffffff;
    --footer-h:  62px;
    --radius:    14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    padding-bottom: calc(var(--footer-h) + 8px);
  }

  /* Header */
  .header {
    background: var(--pink); padding: 14px 16px 12px;
    position: sticky; top: 0; z-index: 20;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-title { flex: 1; font-size: 20px; font-weight: 700; color: #fff; }
  .reload-btn {
    background: rgba(255,255,255,0.22); border: none; border-radius: 50%;
    width: 36px; height: 36px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .reload-btn:active { background: rgba(255,255,255,0.4); }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.9); border-radius: 22px; padding: 8px 14px;
  }
  .search-box svg { flex-shrink: 0; opacity: 0.45; }
  .search-box input {
    border: none; background: none; outline: none;
    font-family: inherit; font-size: 14px; color: var(--text); width: 100%;
  }
  .search-box input::placeholder { color: #bbb; }

  /* Grid */
  .grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; padding: 14px 12px 8px;
  }
  .card {
    background: var(--white); border-radius: var(--radius); overflow: hidden;
    cursor: pointer; box-shadow: 0 1px 4px rgba(240,98,146,0.10);
    transition: transform 0.13s;
  }
  .card:active { transform: scale(0.96); }

  /* カード画像：上余白を詰めて絵をアップで */
  .card-img {
    width: 100%; padding-top: 105%;
    position: relative; overflow: hidden;
    background: linear-gradient(160deg, #fce4ec 0%, #e8eaf6 100%);
  }
  .card-img img {
    position: absolute; top: -10%; left: 0; width: 100%; height: 200%;
    object-fit: cover; object-position: top center; display: block;
  }
  .card-img .no-img {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #fce7f3, #ede9fe); font-size: 36px;
  }
  .card-body { padding: 9px 10px 11px; border-top: 1px solid var(--border); }
  .card-meta { display: flex; align-items: baseline; gap: 5px; flex-wrap: wrap; }
  .card-chara {
    font-size: 12px; font-weight: 700; color: var(--pink);
    letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  }
  .card-name {
    font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 12px 16px 16px;
  }
  .pg-btn {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 7px 18px; font-size: 13px; font-weight: 500;
    font-family: inherit; color: var(--text-sub); cursor: pointer;
  }
  .pg-btn:not(:disabled):active { background: var(--pink-bg); }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }
  .pg-info { font-size: 13px; color: var(--text-sub); min-width: 56px; text-align: center; }

  .state {
    grid-column: 1/-1; padding: 56px 16px; text-align: center;
    color: var(--text-sub); font-size: 14px; line-height: 2;
  }
  .state .ico { font-size: 44px; display: block; margin-bottom: 10px; }

  /* Footer Nav */
  .footer {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; height: var(--footer-h);
    background: var(--white); border-top: 1px solid #f8bbd0;
    display: flex; z-index: 30;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; border: none; background: none; cursor: pointer;
    font-family: inherit; color: #bdbdbd; font-size: 10px; font-weight: 500;
    padding: 6px 2px; transition: color 0.15s; position: relative;
  }
  .nav-btn svg { width: 22px; height: 22px; transition: transform 0.15s; }
  .nav-btn.active { color: var(--pink); }
  .nav-btn.active svg { transform: scale(1.15); }
  .nav-btn.active::after {
    content: ''; position: absolute; top: 0; left: 20%; right: 20%;
    height: 2.5px; background: var(--pink); border-radius: 0 0 3px 3px;
  }

  /* Modal：中央表示・大きめ */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.52); z-index: 100;
    align-items: center; justify-content: center; padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 22px;
    width: 100%; max-width: 400px; max-height: 90vh;
    overflow-y: auto; animation: pop .2s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.92); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .modal-pill {
    width: 38px; height: 4px; background: #e0e0e0;
    border-radius: 99px; margin: 12px auto 0;
  }
  .modal-top { display: flex; align-items: center; gap: 10px; padding: 14px 16px 0; }
  .modal-back {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--pink-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .modal-back svg { width: 18px; height: 18px; stroke: var(--pink-dark); fill: none; stroke-width: 2.2; stroke-linecap: round; }
  .modal-titles { flex: 1; min-width: 0; }
  .modal-chara { font-size: 11px; font-weight: 700; color: var(--pink); letter-spacing: 0.06em; }
  .modal-name  { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; margin-top: 2px; }

  /* モーダル画像：大きめに */
  .modal-card-wrap {
    margin: 16px auto 0;
    width: min(280px, 75vw);
    aspect-ratio: 2/3;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(240,98,146,0.22);
    background: linear-gradient(160deg,#fce4ec,#e8eaf6);
  }
  .modal-card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-card-wrap .no-img {
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px;
  }
  .modal-meta { padding: 14px 20px 28px; }
  .modal-yomi { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
  .modal-note {
    margin-top: 10px; font-size: 13px; color: var(--text-sub);
    background: var(--pink-bg); border-radius: 10px; padding: 10px 14px; line-height: 1.65;
  }

  /* デバッグ表示 */
  #debug { font-size:10px; color:#aaa; padding: 4px 12px; display:none; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-title" id="header-title">みんな</div>
    <button class="reload-btn" id="reload-btn" aria-label="再読み込み">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="検索（現在のタブ内）">
  </div>
</header>

<div id="debug"></div>

<main>
  <div class="grid" id="grid">
    <div class="state"><span class="ico">🌸</span>読み込み中…</div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<footer class="footer" id="footer"></footer>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-pill"></div>
    <div class="modal-top">
      <button class="modal-back" id="modal-back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="modal-titles">
        <div class="modal-chara" id="m-chara"></div>
        <div class="modal-name"  id="m-name"></div>
      </div>
    </div>
    <div class="modal-card-wrap" id="m-img"></div>
    <div class="modal-meta">
      <div class="modal-yomi" id="m-yomi"></div>
      <div class="modal-note" id="m-note" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwiWgNu6Vcw9Gyk3UHxCS9bSomX9T8WeWpeRIJDM93D3aYwOoesz-QnY9EJdCMbsHOSetZFv7sIrIp/pub?output=csv";
const PAGE_SIZE = 20;

// 列インデックス（0始まり）- ヘッダー名に頼らず列番号で直接取得
// A=0:キャラ名, B=1:コード名, C=2:画像URL, D=3:備考1, E=4:備考2, F=5:備考3
const CI = { chara:0, code:1, img:2, yomi:3, note1:4, note2:5 };

const NAVS = [
  { label:"みんな",   filter:null       , icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>` },
  { label:"ゆいしょ", filter:"ゆいしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>` },
  { label:"りいしょ", filter:"りいしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>` },
  { label:"ういしょ", filter:"ういしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>` },
  { label:"れいしょ", filter:"れいしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` },
  { label:"よいしょ", filter:"よいしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>` },
  { label:"ないしょ", filter:"ないしょ", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` },
];

const footerEl = document.getElementById("footer");
NAVS.forEach((n, i) => {
  const btn = document.createElement("button");
  btn.className = "nav-btn" + (i===0?" active":"");
  btn.innerHTML = n.icon + `<span>${n.label}</span>`;
  btn.onclick = () => switchNav(i);
  footerEl.appendChild(btn);
});

let allData=[], activeFilter=null, searchQ="", currentPage=1;
const gridEl=document.getElementById("grid");
const pagEl=document.getElementById("pagination");
const titleEl=document.getElementById("header-title");
const srchEl=document.getElementById("search");
const overlay=document.getElementById("overlay");

function switchNav(i){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  footerEl.children[i].classList.add("active");
  activeFilter=NAVS[i].filter;
  titleEl.textContent=NAVS[i].label;
  srchEl.value=""; searchQ=""; currentPage=1;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

// カタカナ→ひらがな変換
function toHira(str){
  return str.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
}
// ひらがな→カタカナ変換
function toKata(str){
  return str.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0)+0x60));
}
// 検索用：入力をひらがな・カタカナ両方にマッチ
function matchSearch(target, q){
  if(!q) return true;
  const t = target.toLowerCase();
  const qH = toHira(q.toLowerCase());
  const qK = toKata(q.toLowerCase());
  return t.includes(q.toLowerCase()) || t.includes(qH) || t.includes(qK);
}

// CSV parse（列インデックスベース）
function parseCSV(text){
  const rows=[]; let row=[],f="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){if(c==='"'&&n==='"'){f+='"';i++;}else if(c==='"'){inQ=false;}else{f+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){row.push(f);f="";}
    else if(c==='\r'&&n==='\n'){row.push(f);rows.push(row);row=[];f="";i++;}
    else if(c==='\n'||c==='\r'){row.push(f);rows.push(row);row=[];f="";}
    else{f+=c;}}
  }
  if(f||row.length){row.push(f);rows.push(row);}
  return rows;
}

function rowsToData(rows){
  // 1行目はヘッダー、2行目以降がデータ
  // 列インデックスで直接取得するので列名に依存しない
  return rows.slice(1).filter(r=>r.some(c=>(c||"").trim())).map(r=>({
    chara: (r[CI.chara]||"").trim(),
    code:  (r[CI.code] ||"").trim(),
    img:   (r[CI.img]  ||"").trim(),
    yomi:  (r[CI.yomi] ||"").trim(),
    note1: (r[CI.note1]||"").trim(),
    note2: (r[CI.note2]||"").trim(),
  }));
}

async function fetchData(){
  showState("🌸","読み込み中…");
  const ck="freca_v6",ct="freca_t6",TTL=5*60*1000;
  try{
    const c=sessionStorage.getItem(ck),t=sessionStorage.getItem(ct);
    if(c&&t&&Date.now()-Number(t)<TTL){allData=JSON.parse(c);render();return;}
  }catch(e){}
  try{
    const res=await fetch(SHEET_CSV_URL,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const rows=parseCSV(await res.text());
    allData=rowsToData(rows);
    try{sessionStorage.setItem(ck,JSON.stringify(allData));sessionStorage.setItem(ct,String(Date.now()));}catch(e){}
    render();
  }catch(e){showState("⚠️","読み込みに失敗しました："+e.message);}
}

function getFiltered(){
  return allData.filter(d=>{
    // タブフィルター（現在のタブ内のみ）
    if(activeFilter!==null && d.chara!==activeFilter) return false;
    if(!searchQ) return true;
    // コード名・よみ両方をひらかな/カタカナ両対応で検索
    return matchSearch(d.code, searchQ) || matchSearch(d.yomi, searchQ);
  });
}

function render(){
  const list=getFiltered();
  const total=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  if(currentPage>total) currentPage=1;
  const page=list.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  if(!page.length){showState("🔍","見つかりません");return;}

  const frag=document.createDocumentFragment();
  page.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=
      `<div class="card-img">${d.img
        ?`<img src="${esc(d.img)}" alt="${esc(d.code)}" loading="lazy" decoding="async">`
        :`<div class="no-img">🌸</div>`}</div>`+
      `<div class="card-body"><div class="card-meta">`+
        `<span class="card-chara">${esc(d.chara)}</span>`+
        `<span class="card-name">${esc(d.code)}</span>`+
      `</div></div>`;
    card.onclick=()=>openModal(d);
    frag.appendChild(card);
  });
  gridEl.innerHTML="";
  gridEl.appendChild(frag);
  renderPag(total);
}

function renderPag(total){
  if(total<=1){pagEl.innerHTML="";return;}
  pagEl.innerHTML=
    `<button class="pg-btn" onclick="gp(${currentPage-1})" ${currentPage===1?"disabled":""}>‹ 前</button>`+
    `<span class="pg-info">${currentPage} / ${total}</span>`+
    `<button class="pg-btn" onclick="gp(${currentPage+1})" ${currentPage===total?"disabled":""}>次 ›</button>`;
}
window.gp=p=>{currentPage=p;render();window.scrollTo({top:0,behavior:"smooth"});};

function showState(ico,msg){
  gridEl.innerHTML=`<div class="state"><span class="ico">${ico}</span>${esc(msg)}</div>`;
  pagEl.innerHTML="";
}

function openModal(d){
  document.getElementById("m-chara").textContent=d.chara;
  document.getElementById("m-name").textContent=d.code;
  document.getElementById("m-yomi").textContent=d.yomi?"よみ："+d.yomi:"";
  const note=[d.note1,d.note2].filter(Boolean).join("　");
  const ne=document.getElementById("m-note");
  ne.style.display=note?"block":"none"; ne.textContent=note;
  const iw=document.getElementById("m-img");
  iw.innerHTML=d.img
    ?`<img src="${esc(d.img)}" alt="${esc(d.code)}" loading="lazy">`
    :`<div class="no-img">🌸</div>`;
  overlay.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){
  overlay.classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("modal-back").onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};

srchEl.addEventListener("input",e=>{searchQ=e.target.value;currentPage=1;render();});
document.getElementById("reload-btn").onclick=()=>{
  sessionStorage.removeItem("freca_v6");
  sessionStorage.removeItem("freca_t6");
  fetchData();
};

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

fetchData();
</script>
</body>
</html>
