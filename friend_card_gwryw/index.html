<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>フレカ登録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:      #f9a8c9;
  --pink-bg:   #fde8f3;
  --text:      #5c4a6e;
  --text-sub:  #c4a8c4;
  --border:    #f5ddef;
  --bg:        #fef5fb;
  --white:     #ffffff;
  --radius:    16px;
  --green:     #6dbe8d;
  --red:       #e06f6f;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(160deg, #fff5fb 0%, #f5f0ff 100%);
  background-attachment: fixed;
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* 認証画面 */
.auth-screen {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, #fff5fb 0%, #f5f0ff 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; padding: 32px;
}
.auth-logo { font-size: 48px; margin-bottom: 16px; }
.auth-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.auth-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 32px; }
.auth-box {
  width: 100%; max-width: 320px;
  background: var(--white); border-radius: 20px;
  padding: 24px; box-shadow: 0 4px 24px rgba(249,168,201,0.2);
}
.auth-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
.auth-input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-family: inherit; font-size: 16px;
  color: var(--text); background: var(--bg);
  outline: none; margin-bottom: 12px;
}
.auth-input:focus { border-color: var(--pink); background: var(--white); }
.auth-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #f9b8d4, #c9b8f0);
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 16px; font-weight: 700;
  color: #fff; cursor: pointer;
}
.auth-btn:disabled { opacity: 0.6; cursor: default; }
.auth-error { font-size: 12px; color: var(--red); margin-top: 8px; text-align: center; min-height: 18px; }

/* メイン */
.header {
  background: linear-gradient(135deg, #f9b8d4 0%, #c9b8f0 100%);
  padding: 16px 16px 14px;
  position: sticky; top: 0; z-index: 20;
}
.header-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.8); }
.upload-zone {
  margin: 16px 12px 0;
  border: 2.5px dashed var(--border);
  border-radius: var(--radius);
  background: var(--white);
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.upload-zone.drag-over { border-color: var(--pink); background: var(--pink-bg); }
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 40px; margin-bottom: 10px; }
.upload-label { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.upload-sub { font-size: 12px; color: var(--text-sub); }
.progress-wrap { margin: 14px 12px 0; display: none; }
.progress-wrap.show { display: block; }
.progress-label { font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
.progress-bar-bg { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #f9b8d4, #c9b8f0); border-radius: 99px; width: 0%; transition: width 0.3s; }
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text-sub);
  padding: 18px 14px 8px;
  display: flex; align-items: center; gap: 6px;
}
.badge { background: var(--pink); color: #fff; font-size: 11px; font-weight: 700; border-radius: 99px; padding: 2px 8px; }
.badge.done { background: var(--green); }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
.card {
  background: var(--white); border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 2px 10px rgba(249,168,201,0.15);
  border: 2px solid transparent; transition: border-color 0.2s;
}
.card.incomplete { border-color: var(--pink); }
.card.complete   { border-color: var(--green); }
.card.error      { border-color: var(--red); }
.card-img-wrap {
  width: 100%; padding-top: 105%;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #fde8f3 0%, #e8e4f8 100%);
}
.card-img-wrap img {
  position: absolute; top: -10%; left: 0;
  width: 100%; height: 200%;
  object-fit: cover; object-position: top center;
}
.card-img-wrap .uploading-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.card-status-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; font-weight: 700;
  border-radius: 99px; padding: 3px 8px;
  background: var(--pink); color: #fff;
}
.card-status-badge.done  { background: var(--green); }
.card-status-badge.error { background: var(--red); }
.card-body { padding: 10px 10px 12px; }
.input-row { margin-bottom: 8px; }
.input-label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; }
.input-field {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 7px 10px;
  font-family: inherit; font-size: 13px;
  color: var(--text); background: var(--bg);
  outline: none; transition: border-color 0.2s;
}
.input-field:focus { border-color: var(--pink); background: var(--white); }
.save-status { font-size: 10px; text-align: right; margin-top: 4px; color: var(--text-sub); min-height: 14px; }
.save-status.ok  { color: var(--green); }
.save-status.err { color: var(--red); }
.empty-state { text-align: center; padding: 48px 16px; color: var(--text-sub); font-size: 14px; line-height: 2; }
.empty-state .ico { display: block; font-size: 40px; margin-bottom: 10px; }
.loading-sheet { text-align: center; padding: 24px 16px; color: var(--text-sub); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #444; color: #fff; font-size: 13px;
  border-radius: 99px; padding: 10px 20px;
  opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<script>
// ========== ここだけ書き換える ==========
const CONFIG = {
  cloudName:    "dx7x9lq1n",
  uploadPreset: "friend_card_gwryw",
  folder:       "friend_card_gwryw",
  gasUrl:       "https://script.google.com/macros/s/AKfycbzVZTWol9Vc2MPrdpVhbRxBJ3Rnjvii6zXMZV3ltmHG-JDc6FremiTLXO_1bnUO2nExvg/exec",
  sheetName:    "test1",
};
const AUTH_TOKEN_KEY = 'freca_auth_token_gwryw'; // ユーザーごとに変える
const AUTH_DATE_KEY  = 'freca_auth_date_gwryw';  // ユーザーごとに変える
// ========================================
</script>

<!-- 認証画面 -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-logo">💕</div>
  <div class="auth-title">フレカ登録</div>
  <div class="auth-sub">パスワードを入力してね</div>
  <div class="auth-box">
    <div class="auth-label">パスワード</div>
    <input class="auth-input" id="pw-input" type="password" placeholder="••••••••">
    <button class="auth-btn" id="pw-btn" onclick="submitPassword()">はいる</button>
    <div class="auth-error" id="pw-error"></div>
  </div>
</div>

<!-- メインコンテンツ（認証後に表示） -->
<div id="main-content" style="display:none">
  <header class="header">
    <div class="header-title">📸 フレカ登録</div>
    <div class="header-sub">画像を選んでアップロードしてね</div>
  </header>

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*" multiple>
    <div class="upload-icon">🖼️</div>
    <div class="upload-label">画像を選択</div>
    <div class="upload-sub">カメラロールから複数選べます</div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label" id="progress-label">アップロード中… 0 / 0</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div id="pending-section" style="display:none">
    <div class="section-title">未入力 <span class="badge" id="pending-badge">0</span></div>
    <div class="grid" id="pending-grid"></div>
  </div>

  <div id="done-section" style="display:none">
    <div class="section-title">登録済み <span class="badge done" id="done-badge">0</span></div>
    <div class="grid" id="done-grid"></div>
  </div>

  <div class="empty-state" id="empty-state" style="display:none">
    <span class="ico">💕</span>
    上の画像ボタンから<br>フレカ写真を選んでね
  </div>

  <div class="loading-sheet" id="loading-sheet">
    <span class="spin">⏳</span> 既存データを読み込み中…
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const cardMap = {};

// ===== 認証 =====
function getToday() {
  return new Date().toISOString().slice(0, 10);
}

async function checkAuth() {
  const token = localStorage.getItem(AUTH_TOKEN_KEY);
  const date  = localStorage.getItem(AUTH_DATE_KEY);
  if (!token || date !== getToday()) return false;
  try {
    const res  = await fetch(CONFIG.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', token }),
    });
    const data = await res.json();
    return data.status === 'ok';
  } catch { return false; }
}

async function submitPassword() {
  const pw  = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const btn = document.getElementById('pw-btn');
  const err = document.getElementById('pw-error');
  btn.disabled = true;
  btn.textContent = '確認中…';
  err.textContent = '';
  try {
    const res  = await fetch(CONFIG.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'auth', password: pw }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      localStorage.setItem(AUTH_TOKEN_KEY, data.token);
      localStorage.setItem(AUTH_DATE_KEY, getToday());
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-content').style.display = '';
      onAuthSuccess();
    } else {
      err.textContent = 'パスワードが違います';
      btn.disabled = false;
      btn.textContent = 'はいる';
    }
  } catch {
    err.textContent = '通信エラーが発生しました';
    btn.disabled = false;
    btn.textContent = 'はいる';
  }
}

async function initAuth() {
  const ok = await checkAuth();
  if (ok) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-content').style.display = '';
    onAuthSuccess();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitPassword();
    });
  }
}

function onAuthSuccess() {
  loadExistingCards();
  document.getElementById('file-input').addEventListener('change', e => {
    handleFiles([...e.target.files]);
    e.target.value = '';
  });
  const uploadZone = document.getElementById('upload-zone');
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
  });
}

// ===== 既存データ読み込み =====
async function loadExistingCards() {
  try {
    const res  = await fetch(CONFIG.gasUrl + '?sheetName=' + encodeURIComponent(CONFIG.sheetName));
    const data = await res.json();
    if (data.status === 'ok' && data.rows.length) {
      data.rows.forEach(row => {
        const card = {
          id: 'existing-' + Math.random(),
          blob: null, url: row.url,
          charaName: row.charaName, codeName: row.codeName,
          status: 'done', fromSheet: true,
        };
        cardMap[card.id] = card;
        renderCard(card);
      });
    }
  } catch(e) { console.warn('既存データ取得失敗:', e); }
  document.getElementById('loading-sheet').style.display = 'none';
  updateSections();
}

// ===== QRトリミング =====
async function trimByQR(blob) {
  return new Promise(resolve => {
    const img = new Image();
    const objUrl = URL.createObjectURL(blob);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(objUrl);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const qr = jsQR(imageData.data, imageData.width, imageData.height);
      if (!qr) { resolve(blob); return; }
      const ys = [qr.location.topLeftCorner.y, qr.location.topRightCorner.y,
                  qr.location.bottomLeftCorner.y, qr.location.bottomRightCorner.y];
      const qrTop    = Math.min(...ys);
      const qrBottom = Math.max(...ys);
      const qrHeight = qrBottom - qrTop;
      const newTop    = Math.max(0, Math.round(qrTop - qrHeight * 2.6));
      const newBottom = Math.min(canvas.height, Math.round(qrBottom + qrHeight * 0.6));
      const cropH     = newBottom - newTop;
      const out = document.createElement('canvas');
      out.width  = canvas.width;
      out.height = cropH;
      out.getContext('2d').drawImage(canvas, 0, newTop, canvas.width, cropH, 0, 0, canvas.width, cropH);
      out.toBlob(b => resolve(b || blob), 'image/webp', 0.92);
    };
    img.onerror = () => resolve(blob);
    img.src = objUrl;
  });
}

// ===== Cloudinaryアップロード =====
async function uploadToCloudinary(blob, filename) {
  const fd = new FormData();
  fd.append('file', blob, filename);
  fd.append('upload_preset', CONFIG.uploadPreset);
  fd.append('folder', CONFIG.folder);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.cloudName}/image/upload`, {
    method: 'POST', body: fd
  });
  if (!res.ok) throw new Error('Upload failed: ' + res.status);
  const data = await res.json();
  return data.secure_url.replace('/upload/', '/upload/c_crop,g_center,h_1800,w_1100,q_auto,f_auto/');
}

// ===== GAS保存 =====
async function saveToSheet(card) {
  await fetch(CONFIG.gasUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'save',
      sheetName: CONFIG.sheetName,
      url:       card.url       || "",
      charaName: card.charaName || "",
      codeName:  card.codeName  || "",
    }),
    mode: 'no-cors'
  });
}

async function saveToSheetWithStatus(card) {
  if (!card.url) return;
  const statusEl = document.getElementById('save-status-' + card.id);
  if (statusEl) { statusEl.textContent = '保存中…'; statusEl.className = 'save-status'; }
  try {
    await saveToSheet(card);
    if (statusEl) { statusEl.textContent = '✓ 保存しました'; statusEl.className = 'save-status ok'; }
  } catch {
    if (statusEl) { statusEl.textContent = '保存失敗'; statusEl.className = 'save-status err'; }
  }
}

// ===== ファイル処理 =====
async function handleFiles(files) {
  if (!files.length) return;
  const progressWrap  = document.getElementById('progress-wrap');
  const progressBar   = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  progressWrap.classList.add('show');
  let done = 0;
  const total = files.length;
  progressLabel.textContent = `アップロード中… 0 / ${total}`;
  progressBar.style.width = '0%';
  for (const file of files) {
    const id = 'new-' + Date.now() + '-' + Math.random();
    const card = { id, blob: null, url: null, charaName: '', codeName: '', status: 'uploading', fromSheet: false };
    cardMap[id] = card;
    renderCard(card);
    try {
      const trimmed = await trimByQR(file);
      card.blob   = trimmed;
      card.url    = await uploadToCloudinary(trimmed, file.name);
      card.status = 'done';
      await saveToSheet(card).catch(() => {});
    } catch { card.status = 'error'; }
    done++;
    progressLabel.textContent = `アップロード中… ${done} / ${total}`;
    progressBar.style.width = (done / total * 100) + '%';
    updateCardImage(card);
    updateCardBadge(card);
    updateCardStyle(card);
    moveCardToSection(card);
    updateSections();
  }
  progressWrap.classList.remove('show');
  showToast(`${done}枚アップロード完了！`);
}

// ===== カード描画 =====
function renderCard(card) {
  const el = document.createElement('div');
  el.className = 'card incomplete';
  el.id = 'card-' + card.id;

  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-wrap';
  imgWrap.id = 'img-wrap-' + card.id;

  if (card.url) {
    const img = document.createElement('img');
    img.src = card.url; img.alt = '';
    imgWrap.appendChild(img);
  } else if (card.blob) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(card.blob); img.alt = '';
    imgWrap.appendChild(img);
  }
  if (card.status === 'uploading') {
    const overlay = document.createElement('div');
    overlay.className = 'uploading-overlay';
    overlay.id = 'overlay-' + card.id;
    overlay.innerHTML = '<span class="spin">⏳</span>';
    imgWrap.appendChild(overlay);
  }
  const badge = document.createElement('div');
  badge.className = 'card-status-badge';
  badge.id = 'badge-' + card.id;
  badge.textContent = card.status === 'uploading' ? '⏳' : card.status === 'error' ? 'エラー' : '未入力';
  imgWrap.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'card-body';

  const charaRow = document.createElement('div');
  charaRow.className = 'input-row';
  charaRow.innerHTML = '<div class="input-label">キャラ名</div>';
  const charaInput = document.createElement('input');
  charaInput.className = 'input-field';
  charaInput.id = 'chara-' + card.id;
  charaInput.type = 'text';
  charaInput.placeholder = '例：ゆいしょ';
  charaInput.value = card.charaName || '';
  charaRow.appendChild(charaInput);

  const codeRow = document.createElement('div');
  codeRow.className = 'input-row';
  codeRow.innerHTML = '<div class="input-label">コーデ名</div>';
  const codeInput = document.createElement('input');
  codeInput.className = 'input-field';
  codeInput.id = 'code-' + card.id;
  codeInput.type = 'text';
  codeInput.placeholder = 'コーデ名を入力';
  codeInput.value = card.codeName || '';
  codeRow.appendChild(codeInput);

  const saveStatus = document.createElement('div');
  saveStatus.className = 'save-status';
  saveStatus.id = 'save-status-' + card.id;

  body.appendChild(charaRow);
  body.appendChild(codeRow);
  body.appendChild(saveStatus);
  el.appendChild(imgWrap);
  el.appendChild(body);

  charaInput.addEventListener('input', () => {
    card.charaName = charaInput.value.trim();
    updateCardBadge(card); updateCardStyle(card);
  });
  codeInput.addEventListener('input', () => {
    card.codeName = codeInput.value.trim();
    updateCardBadge(card); updateCardStyle(card);
  });
  charaInput.addEventListener('blur', () => {
    card.charaName = charaInput.value.trim();
    updateCardBadge(card); updateCardStyle(card);
    moveCardToSection(card); updateSections();
    saveToSheetWithStatus(card);
  });
  codeInput.addEventListener('blur', () => {
    card.codeName = codeInput.value.trim();
    updateCardBadge(card); updateCardStyle(card);
    moveCardToSection(card); updateSections();
    saveToSheetWithStatus(card);
  });

  const isComplete = card.charaName && card.codeName;
  const targetGrid = isComplete
    ? document.getElementById('done-grid')
    : document.getElementById('pending-grid');
  targetGrid.appendChild(el);
  updateCardStyle(card);
  updateSections();
}

function updateCardImage(card) {
  const imgWrap = document.getElementById('img-wrap-' + card.id);
  if (!imgWrap) return;
  const existingImg = imgWrap.querySelector('img');
  if (existingImg) existingImg.remove();
  const overlay = document.getElementById('overlay-' + card.id);
  if (overlay) overlay.remove();
  if (card.url || card.blob) {
    const img = document.createElement('img');
    img.src = card.url || URL.createObjectURL(card.blob);
    img.alt = '';
    imgWrap.insertBefore(img, imgWrap.firstChild);
  }
}

function updateCardBadge(card) {
  const badge = document.getElementById('badge-' + card.id);
  if (!badge) return;
  const isComplete = card.charaName && card.codeName;
  if (card.status === 'error')  { badge.textContent = 'エラー'; badge.className = 'card-status-badge error'; }
  else if (isComplete)          { badge.textContent = '登録済'; badge.className = 'card-status-badge done'; }
  else                          { badge.textContent = '未入力'; badge.className = 'card-status-badge'; }
}

function updateCardStyle(card) {
  const el = document.getElementById('card-' + card.id);
  if (!el) return;
  const isComplete = card.charaName && card.codeName;
  el.className = 'card ' + (card.status === 'error' ? 'error' : isComplete ? 'complete' : 'incomplete');
}

function moveCardToSection(card) {
  const el = document.getElementById('card-' + card.id);
  if (!el) return;
  const isComplete = card.charaName && card.codeName && card.status !== 'error';
  const targetGrid = isComplete
    ? document.getElementById('done-grid')
    : document.getElementById('pending-grid');
  if (el.parentElement !== targetGrid) targetGrid.appendChild(el);
}

function updateSections() {
  const pendingGrid  = document.getElementById('pending-grid');
  const doneGrid     = document.getElementById('done-grid');
  const pendingCount = pendingGrid.children.length;
  const doneCount    = doneGrid.children.length;
  document.getElementById('pending-section').style.display = pendingCount ? '' : 'none';
  document.getElementById('done-section').style.display    = doneCount    ? '' : 'none';
  document.getElementById('pending-badge').textContent = pendingCount;
  document.getElementById('done-badge').textContent    = doneCount;
  document.getElementById('empty-state').style.display = (!pendingCount && !doneCount) ? '' : 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== 起動 =====
initAuth();
</script>
</body>
</html>
